# Test configuration using H2 in MySQL compatibility mode
# This allows tests to run without requiring a real MySQL database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway configuration for tests
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/h2
